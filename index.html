<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibetown Runner</title>
  <style>
    @font-face {
      font-family: 'Brice';
      src: url('/assets/fonts/BriceBold.otf') format('opentype');
      font-weight: 700;
      font-display: swap;
    }
    @font-face {
      font-family: 'Brice';
      src: url('/assets/fonts/BriceBlack.otf') format('opentype');
      font-weight: 900;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Brice', sans-serif;
    }
    #game {
      image-rendering: auto;
    }

    .lfv-side {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lfv-side.hidden { display: none; }
    .lfv-side-img {
      width: 204px;
      height: 204px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    @keyframes sf-drift {
      0%, 100% { transform: translateY(0); opacity: 0.75; }
      50% { transform: translateY(-3px); opacity: 0.95; }
    }
    @keyframes sf-drift-alt {
      0%, 100% { transform: translateY(0); opacity: 0.95; }
      50% { transform: translateY(2px); opacity: 0.7; }
    }
    .shadow-funk-side {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      overflow: hidden;
    }
    .shadow-funk-side.hidden { display: none; }
    .sf-helmet {
      width: 144px;
      height: 144px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .sf-text {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .sf-shadow { animation: sf-drift 1.2s ease-in-out infinite; }
    .sf-funk { animation: sf-drift-alt 1.2s ease-in-out infinite 0.3s; }

    /* ── Main Menu Overlay ── */
    #menu-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: auto;
      background: #0a0a0a;
    }
    #menu-screen.hidden { display: none; }

    #menu-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: brightness(0.55);
    }

    #menu-content {
      position: relative;
      z-index: 2;
      text-align: center;
      margin: auto;
      padding: 10px 0 0;
    }

    #menu-music-toggle {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Brice', sans-serif;
      font-weight: 900;
      font-size: 6px;
      color: rgba(255,255,255,0.8);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    @keyframes menu-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    #menu-panel.hidden, #instructions-panel.hidden, #options-panel.hidden, #leaderboard-panel.hidden { display: none; }
    #instructions-panel, #options-panel, #leaderboard-panel {
      position: relative;
      width: min(968px, 90vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: min(34px, 3.75vh);
    }
    #menu-panel {
      position: relative;
      width: min(640px, 85vw);
      aspect-ratio: 1;
      max-height: 75vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      animation: menu-float 3s ease-in-out infinite;
    }
    #menu-panel img {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Invisible clickable regions over each button in the 256x256 image scaled to 512x512 */
    .menu-hit {
      position: absolute;
      cursor: pointer;
      background: transparent;
      border: none;
      transition: filter 0.15s;
    }
    .menu-hit:hover {
      cursor: pointer;
    }
    /* Button hit regions as percentages of 640px panel */
    #btn-play         { left: 17.5%; top: 28.4%; width: 66.4%; height: 11.7%; }
    #btn-instructions { left: 17.5%; top: 43.0%; width: 66.4%; height: 11.7%; }
    #btn-options      { left: 17.5%; top: 57.5%; width: 66.4%; height: 11.7%; }
    #btn-quit         { left: 17.5%; top: 71.9%; width: 66.4%; height: 11.7%; }

    .menu-btn {
      display: block;
      margin: 12px auto;
      padding: 14px 48px;
      font-family: 'Brice', sans-serif;
      font-weight: 700;
      font-size: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      background: rgba(0,0,0,0.5);
      color: white;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.2s;
      min-width: 240px;
    }
    .menu-btn:hover {
      background: rgba(245,215,110,0.2);
      border-color: #F5D76E;
      color: #F5D76E;
    }

    /* ── Options Modal ── */
    #options-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.85);
    }
    #options-modal.hidden { display: none; }
    #options-box {
      position: relative;
      width: min(968px, 90vw);
      aspect-ratio: 1;
      max-height: 75vh;
      text-align: center;
      color: white;
    }
    #options-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      z-index: 0;
    }
    #options-inner {
      position: absolute;
      top: 50%;
      left: 25%;
      right: 25%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.75);
      border-radius: 10px;
      z-index: 1;
      padding: 24px 32px;
    }
    .option-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 28px;
      font-family: 'Brice', sans-serif;
      font-weight: 700;
      color: #ccc;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .toggle-btn {
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
    }
    .toggle-btn img {
      width: 48px;
      height: 48px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── Leaderboard Panel (inside menu) ── */
    #leaderboard-panel.hidden { display: none; }
    #leaderboard-box {
      position: relative;
      width: min(968px, 90vw);
      aspect-ratio: 1;
      max-height: 75vh;
      text-align: center;
      color: white;
    }
    #leaderboard-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      z-index: 0;
    }
    #leaderboard-inner {
      position: absolute;
      top: 27%;
      left: 25%;
      right: 25%;
      bottom: 15%;
      background: rgba(0,0,0,0.75);
      border-radius: 10px;
      z-index: 1;
      padding: 12px 14px;
      overflow-y: auto;
    }
    #leaderboard-list {
      text-align: left;
      font-family: 'Brice', sans-serif;
      font-weight: 700;
      font-size: 21px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .lb-header, .lb-row {
      display: flex;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .lb-header {
      color: #F5D76E;
      font-size: 11px;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      padding: 4px 0 6px;
      z-index: 1;
      border-bottom: 1px solid rgba(245,215,110,0.2);
      margin-bottom: 2px;
    }
    .lb-row { color: #ddd; }
    .lb-rank { width: 32px; text-align: center; }
    .lb-name { flex: 2; }
    .lb-level { flex: 1; text-align: center; }
    .lb-score { flex: 1; text-align: right; }
    .lb-row.highlight {
      color: #F5D76E;
      background: rgba(245,215,110,0.1);
      border-radius: 4px;
    }

    /* ── Score Submission Modal ── */
    #score-submit {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.85);
    }
    #score-submit.hidden { display: none; }
    #score-submit-box {
      position: relative;
      width: min(700px, 85vw);
      aspect-ratio: 1;
      text-align: center;
      color: white;
    }
    #highscore-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      z-index: 0;
    }
    #score-submit-inner {
      position: absolute;
      top: 28%;
      left: 22%;
      right: 22%;
      bottom: 30%;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    #score-name-input {
      font-family: 'Brice', sans-serif;
      font-weight: 700;
      font-size: 18px;
      padding: 8px 12px;
      width: 80%;
      text-align: center;
      background: rgba(0,0,0,0.8);
      border: none;
      border-radius: 2px;
      color: #FFFFFF;
      outline: none;
      text-transform: uppercase;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #score-name-input::placeholder {
      color: rgba(255,255,255,0.3);
    }
    .score-info {
      font-family: 'Brice', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #FFFFFF;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #score-submit-buttons {
      display: flex;
      gap: 12px;
      z-index: 1;
      position: absolute;
      bottom: 18%;
      left: 50%;
      transform: translateX(-50%);
    }
    #score-submit-buttons button {
      font-family: 'Brice', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 6px 20px;
      border: none;
      background: transparent;
      color: #FFFFFF;
      cursor: pointer;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── Instructions Modal ── */
    #instructions-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.85);
    }
    #instructions-modal.hidden { display: none; }

    #instructions-box {
      position: relative;
      width: min(968px, 90vw);
      aspect-ratio: 1;
      max-height: 75vh;
      text-align: center;
      color: white;
    }
    #instructions-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      z-index: 0;
    }
    #instructions-inner {
      position: absolute;
      top: 27%;
      left: 25%;
      right: 25%;
      bottom: 15%;
      background: rgba(0,0,0,0.75);
      border-radius: 10px;
      z-index: 1;
      padding: 16px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .instruction-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 16px;
      font-family: 'Brice', sans-serif;
      font-weight: 700;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .instruction-row:last-child { border-bottom: none; }

    .instruction-key {
      background: rgba(245,215,110,0.15);
      padding: 4px 12px;
      border-radius: 3px;
      font-weight: 700;
      color: #F5D76E;
      font-size: 14px;
    }

    .instruction-desc {
      color: #ccc;
      text-align: right;
    }

    .back-btn {
      position: absolute;
      left: 50%;
      bottom: -10px;
      transform: translateX(-50%);
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      margin-top: 0;
      z-index: 2;
    }
    .back-btn img {
      height: min(78px, 8vh);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <!-- Main Menu -->
  <div id="menu-screen">
    <img id="menu-bg" src="/assets/backgrounds/menu-bg.png" alt="">
    <div id="menu-music-toggle">
      <span style="scale:4;transform-origin:right center;margin-right:16px;-webkit-font-smoothing:none">MUSIC</span>
      <button class="toggle-btn" id="menu-music-btn"><img src="/assets/sprites/toggle-on.png" alt="ON"></button>
    </div>
    <div id="menu-content">
      <div id="menu-panel">
        <img src="/assets/backgrounds/menu-buttons.png" alt="Game Menu">
        <button class="menu-hit" id="btn-play" aria-label="Play"></button>
        <button class="menu-hit" id="btn-instructions" aria-label="Instructions"></button>
        <button class="menu-hit" id="btn-options" aria-label="Options"></button>
        <button class="menu-hit" id="btn-quit" aria-label="Leaderboard"></button>
      </div>
      <div id="instructions-panel" class="hidden">
        <div id="instructions-box">
          <img id="instructions-frame" src="/assets/backgrounds/instructions-frame.png" alt="">
          <div id="instructions-inner">
            <div style="font-family:'Brice',sans-serif;font-weight:900;font-size:36px;color:#F5D76E;text-align:center;margin-top:-8px;margin-bottom:12px;image-rendering:pixelated">HOW TO:</div>
            <div class="instruction-row">
              <span class="instruction-key">ARROWS</span>
              <span class="instruction-desc">Move & Climb</span>
            </div>
            <div class="instruction-row">
              <span class="instruction-key">Z</span>
              <span class="instruction-desc">Dig Left</span>
            </div>
            <div class="instruction-row">
              <span class="instruction-key">C</span>
              <span class="instruction-desc">Dig Right</span>
            </div>
            <div class="instruction-row">
              <span class="instruction-key">SPACE</span>
              <span class="instruction-desc">Activate LFV Mode</span>
            </div>
            <div class="instruction-row">
              <span class="instruction-key">GOAL</span>
              <span class="instruction-desc">Collect all money bags</span>
            </div>
            <div class="instruction-row">
              <span class="instruction-key">ESCAPE</span>
              <span class="instruction-desc">Climb hidden ladder</span>
            </div>
            <div class="instruction-row">
              <span class="instruction-key">HELMET</span>
              <span class="instruction-desc">Shadow Funk Mode</span>
            </div>
            <div class="instruction-row">
              <span class="instruction-key">X</span>
              <span class="instruction-desc">Fire projectile</span>
            </div>
          </div>
        </div>
        <button class="back-btn" id="instructions-close"><img src="/assets/sprites/back-button.png" alt="Back"></button>
      </div>
      <div id="options-panel" class="hidden">
        <div id="options-box">
          <img id="options-frame" src="/assets/backgrounds/options-frame.png" alt="">
          <div id="options-inner">
            <div class="option-row">
              <span>SFX</span>
              <button class="toggle-btn" id="sound-toggle"><img src="/assets/sprites/toggle-on.png" alt="ON"></button>
            </div>
            <div class="option-row">
              <span>Music</span>
              <button class="toggle-btn" id="music-toggle"><img src="/assets/sprites/toggle-on.png" alt="ON"></button>
            </div>
          </div>
        </div>
        <button class="back-btn" id="options-close"><img src="/assets/sprites/back-button.png" alt="Back"></button>
      </div>
      <div id="leaderboard-panel" class="hidden">
        <div id="leaderboard-box">
          <img id="leaderboard-frame" src="/assets/backgrounds/leaderboard-frame.png" alt="">
          <div id="leaderboard-inner">
            <div id="leaderboard-list">
              <div class="lb-header">
                <span class="lb-rank">#</span>
                <span class="lb-name">NAME</span>
                <span class="lb-level">LVL</span>
                <span class="lb-score">SCORE</span>
              </div>
              <div id="lb-entries"></div>
            </div>
          </div>
        </div>
        <button class="back-btn" id="leaderboard-close"><img src="/assets/sprites/back-button.png" alt="Back"></button>
      </div>
    </div>
  </div>


  <!-- Score Submission Modal -->
  <div id="score-submit" class="hidden">
    <div id="score-submit-box">
      <img id="highscore-frame" src="/assets/backgrounds/highscore-frame.png" alt="">
      <div id="score-submit-inner">
        <input type="text" id="score-name-input" maxlength="12" placeholder="YOUR NAME" autocomplete="off">
        <div class="score-info" id="submit-score-display"></div>
        <div class="score-info" id="submit-level-display"></div>
      </div>
      <div id="score-submit-buttons">
        <button id="score-submit-btn">SUBMIT</button>
        <button id="score-skip-btn">SKIP</button>
      </div>
    </div>
  </div>

  <div id="lfv-left" class="lfv-side hidden">
    <img class="lfv-side-img" src="/assets/sprites/lfv-side.gif" alt="">
  </div>
  <div id="lfv-right" class="lfv-side hidden">
    <img class="lfv-side-img" src="/assets/sprites/lfv-side.gif" alt="">
  </div>
  <div id="shadow-funk-left" class="shadow-funk-side hidden">
    <canvas class="sf-text sf-shadow" width="1" height="1"></canvas>
    <img class="sf-helmet" src="/assets/sprites/power-helmet.gif" alt="">
    <canvas class="sf-text sf-funk" width="1" height="1"></canvas>
  </div>
  <div id="shadow-funk-right" class="shadow-funk-side shadow-funk-mirrored hidden">
    <canvas class="sf-text sf-shadow" width="1" height="1"></canvas>
    <img class="sf-helmet" src="/assets/sprites/power-helmet.gif" alt="">
    <canvas class="sf-text sf-funk" width="1" height="1"></canvas>
  </div>
  <canvas id="game"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
