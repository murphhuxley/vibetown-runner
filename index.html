<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibetown Runner</title>
  <style>
    @font-face {
      font-family: 'Brice';
      src: url('/assets/fonts/BriceBold.otf') format('opentype');
      font-weight: 700;
      font-display: swap;
    }
    @font-face {
      font-family: 'Brice';
      src: url('/assets/fonts/BriceBlack.otf') format('opentype');
      font-weight: 900;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Brice', sans-serif;
    }
    #game {
      image-rendering: auto;
    }

    /* ── Main Menu Overlay ── */
    #menu-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #0a0a0a;
    }
    #menu-screen.hidden { display: none; }

    #menu-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: brightness(0.55);
    }

    #menu-content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    @keyframes menu-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    #menu-panel {
      position: relative;
      width: 640px;
      height: 640px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      animation: menu-float 3s ease-in-out infinite;
    }
    #menu-panel img {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Invisible clickable regions over each button in the 256x256 image scaled to 512x512 */
    .menu-hit {
      position: absolute;
      cursor: pointer;
      background: transparent;
      border: none;
      transition: filter 0.15s;
    }
    .menu-hit:hover {
      cursor: pointer;
    }
    /* Button hit regions: 256px source * 2.5x = 640px */
    #btn-play         { left: 112px; top: 182px; width: 425px; height: 75px; }
    #btn-instructions { left: 112px; top: 275px; width: 425px; height: 75px; }
    #btn-options      { left: 112px; top: 368px; width: 425px; height: 75px; }
    #btn-quit         { left: 112px; top: 460px; width: 425px; height: 75px; }

    .menu-btn {
      display: block;
      margin: 12px auto;
      padding: 14px 48px;
      font-family: 'Brice', sans-serif;
      font-weight: 700;
      font-size: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      background: rgba(0,0,0,0.5);
      color: white;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.2s;
      min-width: 240px;
    }
    .menu-btn:hover {
      background: rgba(245,215,110,0.2);
      border-color: #F5D76E;
      color: #F5D76E;
    }

    /* ── Options Modal ── */
    #options-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.8);
    }
    #options-modal.hidden { display: none; }
    #options-box {
      background: #1a1a1a;
      border: 2px solid #F5D76E;
      border-radius: 8px;
      padding: 40px 50px;
      max-width: 400px;
      text-align: center;
      color: white;
    }
    #options-box h2 {
      font-weight: 900;
      font-size: 28px;
      color: #F5D76E;
      margin-bottom: 24px;
    }
    .option-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      font-size: 18px;
      color: #ccc;
    }
    .toggle-btn {
      padding: 8px 24px;
      font-family: 'Brice', sans-serif;
      font-weight: 700;
      font-size: 16px;
      border: 2px solid #F5D76E;
      border-radius: 4px;
      background: rgba(245,215,110,0.15);
      color: #F5D76E;
      cursor: pointer;
    }
    .toggle-btn:hover {
      background: rgba(245,215,110,0.3);
    }

    /* ── Leaderboard Modal ── */
    #leaderboard-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.85);
    }
    #leaderboard-modal.hidden { display: none; }
    #leaderboard-box {
      background: #1a1a1a;
      border: 2px solid #F5D76E;
      border-radius: 8px;
      padding: 30px 40px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      color: white;
    }
    #leaderboard-box h2 {
      font-weight: 900;
      font-size: 28px;
      color: #F5D76E;
      margin-bottom: 20px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #leaderboard-list {
      text-align: left;
      font-family: 'Brice', sans-serif;
      font-weight: 700;
      font-size: 14px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .lb-header, .lb-row {
      display: flex;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .lb-header {
      color: #F5D76E;
      font-size: 12px;
      text-transform: uppercase;
    }
    .lb-rank { width: 40px; text-align: center; }
    .lb-name { flex: 1; }
    .lb-score { width: 80px; text-align: right; }
    .lb-level { width: 50px; text-align: right; }
    .lb-row.highlight {
      color: #F5D76E;
      background: rgba(245,215,110,0.1);
    }

    /* ── Score Submission Modal ── */
    #score-submit {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.85);
    }
    #score-submit.hidden { display: none; }
    #score-submit-box {
      background: #1a1a1a;
      border: 2px solid #F5D76E;
      border-radius: 8px;
      padding: 30px 40px;
      text-align: center;
      color: white;
    }
    #score-submit-box h2 {
      font-weight: 900;
      font-size: 24px;
      color: #F5D76E;
      margin-bottom: 8px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .score-display {
      font-family: 'Brice', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: #ccc;
      margin-bottom: 20px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #score-name-input {
      font-family: 'Brice', sans-serif;
      font-weight: 700;
      font-size: 18px;
      padding: 10px 16px;
      width: 200px;
      text-align: center;
      background: #0a0a0a;
      border: 2px solid #F5D76E;
      border-radius: 4px;
      color: #F5D76E;
      outline: none;
      text-transform: uppercase;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #score-name-input::placeholder {
      color: rgba(245,215,110,0.3);
    }

    /* ── Instructions Modal ── */
    #instructions-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.8);
    }
    #instructions-modal.hidden { display: none; }

    #instructions-box {
      background: #1a1a1a;
      border: 2px solid #F5D76E;
      border-radius: 8px;
      padding: 40px 50px;
      max-width: 500px;
      text-align: center;
      color: white;
    }

    #instructions-box h2 {
      font-weight: 900;
      font-size: 28px;
      color: #F5D76E;
      margin-bottom: 24px;
    }

    .instruction-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 15px;
    }
    .instruction-row:last-child { border-bottom: none; }

    .instruction-key {
      background: rgba(255,255,255,0.1);
      padding: 4px 12px;
      border-radius: 3px;
      font-weight: 700;
      color: #F5D76E;
      font-size: 13px;
    }

    .instruction-desc {
      color: #ccc;
      text-align: right;
    }

    #instructions-close {
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <!-- Main Menu -->
  <div id="menu-screen">
    <img id="menu-bg" src="/assets/backgrounds/menu-bg.png" alt="">
    <div id="menu-content">
      <div id="menu-panel">
        <img src="/assets/backgrounds/menu-buttons.png" alt="Game Menu">
        <button class="menu-hit" id="btn-play" aria-label="Play"></button>
        <button class="menu-hit" id="btn-instructions" aria-label="Instructions"></button>
        <button class="menu-hit" id="btn-options" aria-label="Options"></button>
        <button class="menu-hit" id="btn-quit" aria-label="Quit"></button>
      </div>
    </div>
  </div>

  <!-- Instructions Modal -->
  <div id="instructions-modal" class="hidden">
    <div id="instructions-box">
      <h2>HOW TO PLAY</h2>
      <div class="instruction-row">
        <span class="instruction-key">ARROW KEYS</span>
        <span class="instruction-desc">Move & Climb</span>
      </div>
      <div class="instruction-row">
        <span class="instruction-key">Z</span>
        <span class="instruction-desc">Dig Left</span>
      </div>
      <div class="instruction-row">
        <span class="instruction-key">C</span>
        <span class="instruction-desc">Dig Right</span>
      </div>
      <div class="instruction-row">
        <span class="instruction-key">SPACE</span>
        <span class="instruction-desc">Activate LFV Mode</span>
      </div>
      <div class="instruction-row">
        <span class="instruction-key">GOAL</span>
        <span class="instruction-desc">Collect all money bags</span>
      </div>
      <div class="instruction-row">
        <span class="instruction-key">ESCAPE</span>
        <span class="instruction-desc">Climb the hidden ladder to the top</span>
      </div>
      <button class="menu-btn" id="instructions-close">GOT IT</button>
    </div>
  </div>

  <!-- Options Modal -->
  <div id="options-modal" class="hidden">
    <div id="options-box">
      <h2>OPTIONS</h2>
      <div class="option-row">
        <span>Sound</span>
        <button class="toggle-btn" id="sound-toggle">ON</button>
      </div>
      <button class="menu-btn" id="options-close" style="margin-top:24px">BACK</button>
    </div>
  </div>

  <!-- Leaderboard Modal -->
  <div id="leaderboard-modal" class="hidden">
    <div id="leaderboard-box">
      <h2>LEADERBOARD</h2>
      <div id="leaderboard-list">
        <div class="lb-header">
          <span class="lb-rank">#</span>
          <span class="lb-name">NAME</span>
          <span class="lb-score">SCORE</span>
          <span class="lb-level">LVL</span>
        </div>
        <div id="lb-entries"></div>
      </div>
      <button class="menu-btn" id="leaderboard-close" style="margin-top:20px">BACK</button>
    </div>
  </div>

  <!-- Score Submission Modal -->
  <div id="score-submit" class="hidden">
    <div id="score-submit-box">
      <h2>NEW HIGH SCORE!</h2>
      <div class="score-display" id="submit-score-display"></div>
      <input type="text" id="score-name-input" maxlength="12" placeholder="YOUR NAME" autocomplete="off">
      <br>
      <button class="menu-btn" id="score-submit-btn" style="margin-top:16px">SUBMIT</button>
      <button class="menu-btn" id="score-skip-btn" style="margin-top:8px;opacity:0.6">SKIP</button>
    </div>
  </div>

  <canvas id="game"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
