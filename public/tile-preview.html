<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vibetown Tile Preview</title>
  <style>
    @font-face {
      font-family: Brice;
      src: url('/assets/fonts/BriceBold.otf') format('opentype');
      font-weight: 700;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: #f7f1dc;
      background:
        radial-gradient(circle at 18% 8%, rgba(115, 208, 181, 0.18), transparent 28rem),
        radial-gradient(circle at 85% 12%, rgba(247, 203, 82, 0.14), transparent 24rem),
        #141412;
      font-family: Brice, ui-monospace, monospace;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 18px 24px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.12);
      background: rgba(20, 20, 18, 0.9);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 4vw, 46px);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    p {
      max-width: 1000px;
      margin: 0;
      color: rgba(247, 241, 220, 0.76);
      line-height: 1.45;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    a,
    button {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 8px 13px;
      color: #111;
      background: #f5d76e;
      border: 0;
      border-radius: 8px;
      font: inherit;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 4px 0 #7a5f18;
    }

    button.secondary,
    a.secondary {
      color: #f7f1dc;
      background: #333532;
      box-shadow: 0 4px 0 #171817;
    }

    main {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(430px, 1fr));
      gap: 22px;
      padding: 24px;
    }

    .card {
      padding: 16px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.055);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 22px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .preview-row {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 14px;
      align-items: start;
    }

    .raw {
      width: 128px;
      height: 128px;
      image-rendering: pixelated;
      transform-origin: top left;
      transform: scale(1.18);
      background: #050505;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    canvas {
      width: 100%;
      max-width: 560px;
      height: auto;
      image-rendering: pixelated;
      background:
        linear-gradient(160deg, rgba(255,255,255,0.08), rgba(0,0,0,0.08)),
        #8fb79e;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
      color: rgba(247, 241, 220, 0.72);
      font-size: 12px;
    }

    .chip {
      padding: 8px;
      min-height: 38px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.22);
    }

    .missing {
      color: #ffb0a1;
    }
  </style>
</head>
<body>
  <header>
    <h1>Tile Preview Lab</h1>
    <p>
      This page previews every district atlas before we let it touch gameplay.
      The game defaults to the safer single-tile brick render; autotiling only turns on for URLs that explicitly include <code>?autotile=1</code>.
    </p>
    <div class="actions">
      <a href="/">Open game normal</a>
      <a href="/?autotile=1" class="secondary">Open game with experimental autotile</a>
    </div>
  </header>
  <main id="previews"></main>

  <script>
    const districts = [
      'nature',
      'beach',
      'city',
      'rainbow',
      'grayscale',
      'flower',
      'futuristic',
      'gold',
      'cosmic',
    ];

    const sample = [
      '................',
      '..####..#####...',
      '................',
      '.....########...',
      '................',
      '.####...###..##.',
      '................',
      '################',
    ];

    const tileSize = 32;
    const cellSize = 32;
    const tileAlias = {
      grayscale: 'gray',
      futuristic: 'future',
    };

    function imageHasTransparency(img) {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      if (!ctx) return true;

      try {
        ctx.drawImage(img, 0, 0);
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let transparentPixels = 0;
        for (let i = 3; i < data.length; i += 4) {
          if (data[i] < 248) transparentPixels++;
        }
        return transparentPixels / (canvas.width * canvas.height) >= 0.35;
      } catch {
        return true;
      }
    }

    function loadImage(src, requiresTransparency = false) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          if (requiresTransparency && !imageHasTransparency(img)) {
            resolve(null);
            return;
          }
          resolve({ img, src });
        };
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    async function loadAny(sources, requiresTransparency = false) {
      for (const src of sources) {
        const result = await loadImage(src, requiresTransparency);
        if (result) return result;
      }
      return null;
    }

    function tileDistrict(district) {
      return tileAlias[district] ?? district;
    }

    function districtSources(district, kind) {
      const tileName = tileDistrict(district);
      switch (kind) {
        case 'sand':
          return [`/assets/sprites/${district}-sand.png`, `/assets/tiles/${tileName}-sand.png`];
        case 'edge':
          return [`/assets/sprites/${district}-top-edge.png`, `/assets/tiles/${tileName}-top-edge.png`];
        case 'atlas':
          return [`/assets/sprites/tileset-${district}.png`, `/assets/tilesets/${district}-tileset.png`];
        default:
          return [];
      }
    }

    function hasBlock(x, y) {
      return sample[y]?.[x] === '#';
    }

    function getCell(x, y) {
      const above = hasBlock(x, y - 1);
      const below = hasBlock(x, y + 1);
      const left = hasBlock(x - 1, y);
      const right = hasBlock(x + 1, y);

      if (!above) {
        if (!left && !right) return { x: 1, y: 3 };
        if (!left) return { x: 0, y: 1 };
        if (!right) return { x: 3, y: 0 };
        return { x: 2, y: 0 };
      }

      if (!below) {
        if (!left && !right) return { x: 3, y: 3 };
        if (!left) return { x: 0, y: 2 };
        if (!right) return { x: 3, y: 2 };
        return { x: 1, y: 2 };
      }

      if (!left && !right) return { x: 1, y: 0 };
      if (!left) return { x: 0, y: 2 };
      if (!right) return { x: 3, y: 1 };
      return { x: 2, y: 1 };
    }

    function drawRawGrid(ctx, img) {
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, 128, 128);
      ctx.drawImage(img, 0, 0);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
      ctx.lineWidth = 1;
      for (let i = 1; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(i * cellSize + 0.5, 0);
        ctx.lineTo(i * cellSize + 0.5, 128);
        ctx.moveTo(0, i * cellSize + 0.5);
        ctx.lineTo(128, i * cellSize + 0.5);
        ctx.stroke();
      }
    }

    function drawSample(canvas, tileset, sand, topEdge, ladder, rope) {
      const ctx = canvas.getContext('2d');
      const cols = sample[0].length;
      const rows = sample.length;
      canvas.width = cols * tileSize;
      canvas.height = rows * tileSize;
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, '#9bc6cb');
      sky.addColorStop(1, '#6d8f77');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (!hasBlock(x, y)) continue;
          const px = x * tileSize;
          const py = y * tileSize;

          if (sand) {
            ctx.drawImage(sand, px, py, tileSize, tileSize);
          } else {
            ctx.fillStyle = '#333';
            ctx.fillRect(px, py, tileSize, tileSize);
          }

          if (tileset) {
            const cell = getCell(x, y);
            ctx.drawImage(
              tileset,
              cell.x * cellSize,
              cell.y * cellSize,
              cellSize,
              cellSize,
              px,
              py,
              tileSize,
              tileSize,
            );
          } else if (topEdge && !hasBlock(x, y - 1)) {
            ctx.drawImage(topEdge, px, py, tileSize, tileSize);
          }
        }
      }

      // Navigation swatches are procedural in-game, so avoid previewing stale opaque PNGs.
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(tileSize + 8, tileSize, 3, tileSize * 2);
      ctx.fillRect(tileSize + 22, tileSize, 3, tileSize * 2);
      for (let ry = tileSize + 6; ry < tileSize * 3; ry += 7) {
        ctx.fillRect(tileSize + 8, ry, 17, 2);
      }
      ctx.fillRect(tileSize * 4, tileSize * 2 + 14, tileSize * 8, 3);
    }

    async function renderDistrict(district) {
      const card = document.createElement('section');
      card.className = 'card';
      card.innerHTML = `
        <h2>${district}</h2>
        <div class="preview-row">
          <canvas class="raw" width="128" height="128"></canvas>
          <canvas class="sample"></canvas>
        </div>
        <div class="legend">
          <div class="chip atlas">atlas: loading</div>
          <div class="chip sand">single tile: loading</div>
          <div class="chip edge">top edge: loading</div>
          <div class="chip ladder">ladder: loading</div>
          <div class="chip rope">rope: loading</div>
          <div class="chip route">route: loading</div>
        </div>
      `;
      document.getElementById('previews').appendChild(card);

      const [tileset, sand, topEdge, ladder, rope] = await Promise.all([
        loadAny(districtSources(district, 'atlas')),
        loadAny(districtSources(district, 'sand')),
        loadAny(districtSources(district, 'edge')),
        null,
        null,
      ]);

      card.querySelector('.atlas').textContent = tileset ? `atlas: ${tileset.src}` : 'atlas: missing';
      card.querySelector('.sand').textContent = sand ? `single tile: ${sand.src}` : 'single tile: missing';
      card.querySelector('.edge').textContent = topEdge ? `top edge: ${topEdge.src}` : 'top edge: missing';
      card.querySelector('.ladder').textContent = 'ladder: procedural in-game';
      card.querySelector('.rope').textContent = 'rope: procedural in-game';
      card.querySelector('.route').textContent = tileDistrict(district) === district ? 'route: direct' : `route: ${district} -> ${tileDistrict(district)}`;
      if (!tileset) card.querySelector('.atlas').classList.add('missing');
      if (!sand) card.querySelector('.sand').classList.add('missing');
      if (!topEdge) card.querySelector('.edge').classList.add('missing');
      if (!ladder) card.querySelector('.ladder').classList.add('missing');
      if (!rope) card.querySelector('.rope').classList.add('missing');

      if (tileset) drawRawGrid(card.querySelector('.raw').getContext('2d'), tileset.img);
      drawSample(
        card.querySelector('.sample'),
        tileset?.img ?? null,
        sand?.img ?? null,
        topEdge?.img ?? null,
        ladder?.img ?? null,
        rope?.img ?? null,
      );
    }

    Promise.all(districts.map(renderDistrict));
  </script>
</body>
</html>
